<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content='width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=yes'>
    <title>Unity WebGL Player | TestImageAR</title>
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
        html{
            height: -webkit-fill-available;
            width: 100%;
            overflow: hidden;
        }
        body {
            margin: 0;
            padding: 0;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: var(--app-height, 100vh);
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: none;
        }
        #unity-container,
        #unity-canvas,
        #video-canvas {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: var(--app-height, 100vh);
            overflow: hidden;
        }
        .ctaDiv {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            background: #fffa;
            z-index: 99;
        }
        .startARMessage {
            text-align: center;
            width: min(78vw, 420px);
            line-height: 1.45;
            margin: 0 0 16px;
        }
        .startARMessage .zh {
            display: block;
            margin-top: 8px;
        }
        #startARButton {
            min-width: 132px;
            min-height: 38px;
            padding: 8px 18px;
            border: 0;
            border-radius: 999px;
            background: #e6e6e6;
            color: #222;
            font-size: 14px;
        }
        #trackedHtmlVideoOverlay {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: var(--app-height, 100vh);
            background: #000;
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #trackedHtmlVideoOverlay video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transform: scale(1);
            transform-origin: center center;
            background: #000;
        }
        #trackedHtmlVideoMessage {
            position: absolute;
            left: 24px;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            text-align: center;
            line-height: 1.5;
            display: none;
        }
        #trackedHtmlVideoButton {
            margin-top: 14px;
            min-width: 132px;
            min-height: 38px;
            padding: 8px 18px;
            border: 0;
            border-radius: 999px;
            background: #fff;
            color: #111;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!--IMAGETARGETS-->
		<imagetarget id='Christmas snowflake' src='targets/Christmas%20snowflake.png'></imagetarget>

    <video id="webcam-video" muted autoplay playsinline webkit-playsinline style="width:1px;position:absolute"></video>
    <!-- <video id="webcam-video" muted autoplay playsinline style="width:100%; height:100%; object-fit:cover; position:absolute"></video> -->
    <canvas id="video-canvas" style="width:100%; height:100%; object-fit:cover; position:absolute"></canvas>
    <div id="startARDiv" class="ctaDiv" style="display: none;">
        <select id="chooseCamSel" style="display: none;" onchange="SelectCam()"></select>
        <p id="startARMessage" class="startARMessage">
            This augmented reality experience requires access to your device's camera
            <span class="zh">此增强现实体验需要访问您设备的摄像头</span>
        </p>
        <button id="startARButton" onclick="StartAR()" style="display:none">Tap to start / 点击开始</button>
    </div>
    <div id="screenshotDiv" style="display: none;" class="ctaDiv">
        <div style="position:relative; background-color:white; padding:10px; box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.3), 0 6px 20px 0 rgba(0, 0, 0, 0.25);">
            <img id="screenshotImg" src="" alt="screenshot" style="width:80vw; height:80vh">
            <button onclick="document.getElementById('screenshotDiv').style.display = 'none';" style="position:absolute; transform:translateY(-100%); right:0; top:0">Close</button>
        </div>
    </div>
    <div id="confirmUrlDiv" style="display: none;" class="ctaDiv">
        <div style="position:relative; background-color:white; padding:10px; box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.3), 0 6px 20px 0 rgba(0, 0, 0, 0.25); width: 80vw; display:flex; flex-direction: column; align-items: center;">
            <p id="confirmUrlText" style="text-align: center; width:80%; overflow: hidden; text-overflow: ellipsis;">Are you sure you want to visit url.com?</p>
            <div>
                <button onclick="window.open(newUrlString, '_blank').focus(); document.getElementById('confirmUrlDiv').style.display = 'none'">VISIT SITE</button>
                <button onclick="document.getElementById('confirmUrlDiv').style.display = 'none'">GO BACK</button>
            </div>
        </div>
    </div>
    <div id="errorDiv" class="ctaDiv" style="display: none; background:#aaa">
        <p id="errorText" style="text-align: center; width:60vw; color:white"></p>
    </div>
    <div id="trackedHtmlVideoOverlay">
        <div id="trackedHtmlVideoMessage">
            <div id="trackedHtmlVideoMessageText">Loading video, please wait...<br>视频加载中，请稍候</div>
            <button id="trackedHtmlVideoButton" type="button" style="display:none">Play video / 播放视频</button>
        </div>
    </div>
    <div id="unity-container" class="unity-mobile">
        <canvas id="unity-canvas" style="width: 100%; height: 100%; background: #0000; z-index: -99"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <canvas id="video-canvas"></canvas>
    </div>
    <script src="arcamera.js" type="text/javascript"></script>
    <script src="itracker.js" type="text/javascript"></script>
    <script src="Build/AR-圣诞节.loader.js"></script>
    <script>
            var initialize = async() =>{
                var unityCanvas = document.querySelector("#unity-canvas");
                var videoCanvas = document.querySelector("#video-canvas");
                window.arCamera = new ARCamera(unityCanvas, videoCanvas);
                window.iTracker = new ImageTracker(arCamera);
                try{
                    await window.iTracker.initialize();
                    console.log("ImageTracker initialized!");
                }
                catch{
                    console.error("Failed to initialize ImageTracker. Are you missing opencv.js? " + error);
                    ShowError("Failed to initialize the experience.");
                    return;
                }
                
                iTracker.WEBCAM_NAME = "Default Camera";
                if (IsIOS()) {
                    ShowStartARPrompt();
                }
                else {
                    StartAR();
                }
            }
            initialize();
            var container = document.querySelector("#unity-container");
            var canvas = document.querySelector("#unity-canvas");
            var videoCanvases = document.querySelectorAll("#video-canvas");
            var loadingBar = document.querySelector("#unity-loading-bar");
            var progressBarFull = document.querySelector("#unity-progress-bar-full");
            function GetViewportHeight() {
                return Math.round((window.visualViewport && window.visualViewport.height) || window.innerHeight || document.documentElement.clientHeight);
            }
            function ApplyViewportSize() {
                var width = Math.round((window.visualViewport && window.visualViewport.width) || window.innerWidth || document.documentElement.clientWidth);
                var height = GetViewportHeight();
                document.documentElement.style.setProperty("--app-height", height + "px");
                document.body.style.width = width + "px";
                document.body.style.height = height + "px";
                container.style.width = width + "px";
                container.style.height = height + "px";
                canvas.style.width = width + "px";
                canvas.style.height = height + "px";
                videoCanvases.forEach((videoCanvas) => {
                    videoCanvas.style.width = width + "px";
                    videoCanvas.style.height = height + "px";
                });
                window.scrollTo(0, 0);
            }
            function ScheduleViewportRefresh() {
                ApplyViewportSize();
                requestAnimationFrame(ApplyViewportSize);
                setTimeout(ApplyViewportSize, 100);
                setTimeout(ApplyViewportSize, 500);
            }
            window.addEventListener("resize", ScheduleViewportRefresh);
            window.addEventListener("orientationchange", ScheduleViewportRefresh);
            if (window.visualViewport) {
                window.visualViewport.addEventListener("resize", ScheduleViewportRefresh);
                window.visualViewport.addEventListener("scroll", ScheduleViewportRefresh);
            }
            ScheduleViewportRefresh();
            var unityStarted = false;
            function IsIOS() {
                return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                    (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
            }
            function WithTimeout(promise, timeoutMs) {
                return Promise.race([
                    promise,
                    new Promise((resolve) => setTimeout(resolve, timeoutMs))
                ]);
            }
            function ShowStartARPrompt(buttonText) {
                var startDiv = document.getElementById("startARDiv");
                var startButton = document.getElementById("startARButton");
                startDiv.style.display = "flex";
                startButton.style.display = "block";
                startButton.disabled = false;
                startButton.innerText = buttonText || "Tap to start / 点击开始";
            }
            async function UnlockIOSMedia() {
                if (!IsIOS()) {
                    return;
                }
                try {
                    var AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    if (AudioContextClass) {
                        window.__iosAudioContext = window.__iosAudioContext || new AudioContextClass();
                        if (window.__iosAudioContext.state === "suspended") {
                            await WithTimeout(window.__iosAudioContext.resume(), 800);
                        }
                        var source = window.__iosAudioContext.createBufferSource();
                        source.buffer = window.__iosAudioContext.createBuffer(1, 1, 22050);
                        source.connect(window.__iosAudioContext.destination);
                        source.start(0);
                    }
                }
                catch (err) {
                    console.warn("Failed to unlock iOS audio context", err);
                }
                try {
                    var video = document.querySelector("#webcam-video");
                    if (video) {
                        video.muted = true;
                        video.setAttribute("playsinline", "");
                        video.setAttribute("webkit-playsinline", "");
                        var playPromise = video.play();
                        if (playPromise && playPromise.catch) {
                            await WithTimeout(playPromise.catch(() => {}), 800);
                        }
                        video.pause();
                    }
                }
                catch (err) {
                    console.warn("Failed to unlock iOS video playback", err);
                }
            }
            async function PrimeIOSVideo(url) {
                if (!IsIOS() || !url) {
                    return;
                }
                try {
                    window.__primedVideos = window.__primedVideos || {};
                    if (window.__primedVideos[url]) {
                        return;
                    }
                    var video = document.createElement("video");
                    video.muted = true;
                    video.defaultMuted = true;
                    video.playsInline = true;
                    video.setAttribute("playsinline", "");
                    video.setAttribute("webkit-playsinline", "");
                    video.preload = "auto";
                    video.loop = true;
                    video.src = url;
                    video.style.position = "fixed";
                    video.style.left = "-2px";
                    video.style.top = "-2px";
                    video.style.width = "1px";
                    video.style.height = "1px";
                    video.style.opacity = "0";
                    video.style.pointerEvents = "none";
                    document.body.appendChild(video);
                    window.__primedVideos[url] = video;
                    window.__trackedHtmlVideo = video;
                    if (video.load) {
                        video.load();
                    }
                    var playPromise = video.play();
                    if (playPromise && playPromise.then) {
                        await WithTimeout(playPromise, 1200);
                    }
                    try {
                        video.currentTime = 0;
                    }
                    catch (err) {
                    }
                }
                catch (err) {
                    console.warn("Failed to prime iOS video playback", err);
                }
            }
            async function PrimeTrackedVideosForIOS() {
                await PrimeIOSVideo("StreamingAssets/Christmas.mp4");
            }
            function ApplyTrackedHtmlVideoSize(video, scale, referenceWidth, referenceHeight, videoWidth, videoHeight) {
                var viewportWidth = Math.round((window.visualViewport && window.visualViewport.width) || window.innerWidth || document.documentElement.clientWidth);
                var refWidth = Math.max(1, referenceWidth || 640);
                var cssScale = viewportWidth / refWidth;
                var safeScale = Math.max(0.1, scale || 1);
                var cssWidth = Math.max(1, (videoWidth || refWidth) * cssScale * safeScale);
                var cssHeight = Math.max(1, (videoHeight || (referenceHeight || 1136)) * cssScale * safeScale);
                video.style.width = cssWidth + "px";
                video.style.height = cssHeight + "px";
                video.style.maxWidth = "none";
                video.style.maxHeight = "none";
                video.style.objectFit = "contain";
                video.style.transform = "none";
            }
            function EnsureTrackedHtmlVideoOverlay(url, scale, referenceWidth, referenceHeight, videoWidth, videoHeight) {
                var overlay = document.getElementById("trackedHtmlVideoOverlay");
                var message = document.getElementById("trackedHtmlVideoMessage");
                var messageText = document.getElementById("trackedHtmlVideoMessageText");
                var button = document.getElementById("trackedHtmlVideoButton");
                var video = window.__trackedHtmlVideo;
                if (!video) {
                    video = window.__primedVideos && window.__primedVideos[url]
                        ? window.__primedVideos[url]
                        : document.createElement("video");
                    window.__trackedHtmlVideo = video;
                }
                if (video.parentElement !== overlay) {
                    overlay.insertBefore(video, message);
                }
                video.setAttribute("playsinline", "");
                video.setAttribute("webkit-playsinline", "");
                video.playsInline = true;
                video.controls = false;
                video.loop = true;
                video.muted = false;
                video.volume = 1;
                video.preload = "auto";
                video.style.position = "";
                video.style.left = "";
                video.style.top = "";
                ApplyTrackedHtmlVideoSize(video, scale, referenceWidth, referenceHeight, videoWidth, videoHeight);
                video.style.transformOrigin = "center center";
                video.style.opacity = "";
                video.style.pointerEvents = "";
                if (video.src !== new URL(url, document.baseURI).href) {
                    video.src = url;
                    if (video.load) {
                        video.load();
                    }
                }
                messageText.innerHTML = "Loading video, please wait...<br>视频加载中，请稍候";
                message.style.display = "block";
                button.style.display = "none";
                button.onclick = function () {
                    PlayTrackedHtmlVideo(url, scale, referenceWidth, referenceHeight, videoWidth, videoHeight);
                };
                video.onended = function () {
                    StopTrackedHtmlVideo();
                };
                overlay.style.display = "flex";
                return { overlay, message, messageText, button, video };
            }
            window.PlayTrackedHtmlVideo = function(url, scale, referenceWidth, referenceHeight, videoWidth, videoHeight) {
                var state = EnsureTrackedHtmlVideoOverlay(url, scale, referenceWidth, referenceHeight, videoWidth, videoHeight);
                var video = state.video;
                function showTapFallback() {
                    state.messageText.innerHTML = "Tap to play video<br>点击播放视频";
                    state.button.style.display = "inline-block";
                    state.message.style.display = "block";
                }
                function markPlaying() {
                    state.message.style.display = "none";
                    state.button.style.display = "none";
                }
                function playMutedFallback(err) {
                    console.warn("HTML tracked video play with audio failed; retrying muted", err);
                    video.muted = true;
                    video.defaultMuted = true;
                    var mutedPromise = video.play();
                    if (mutedPromise && mutedPromise.then) {
                        mutedPromise.then(markPlaying).catch(function (mutedErr) {
                            console.warn("HTML tracked muted video play failed", mutedErr);
                            showTapFallback();
                        });
                    }
                    else {
                        markPlaying();
                    }
                }
                try {
                    video.currentTime = 0;
                }
                catch (err) {
                }
                video.defaultMuted = false;
                video.muted = false;
                video.volume = 1;
                var playPromise = video.play();
                if (playPromise && playPromise.then) {
                    playPromise.then(markPlaying).catch(playMutedFallback);
                }
                else {
                    markPlaying();
                }
            };
            window.StopTrackedHtmlVideo = function() {
                var overlay = document.getElementById("trackedHtmlVideoOverlay");
                var video = window.__trackedHtmlVideo;
                if (video) {
                    video.pause();
                    try {
                        video.currentTime = 0;
                    }
                    catch (err) {
                    }
                }
                if (overlay) {
                    overlay.style.display = "none";
                }
            };
            async function StartAR() {
                if (unityStarted) {
                    return;
                }
                unityStarted = true;
                ScheduleViewportRefresh();
                var startButton = document.getElementById("startARButton");
                if (startButton) {
                    startButton.disabled = true;
                    startButton.innerText = "Starting... / 正在启动...";
                }
                var primeVideosPromise = PrimeTrackedVideosForIOS();
                var webcamReady = await RequestWebcam();
                if (!webcamReady) {
                    unityStarted = false;
                    if (startButton) {
                        startButton.disabled = false;
                        startButton.innerText = "Tap to start / 点击开始";
                    }
                    return;
                }
                await primeVideosPromise;
                await UnlockIOSMedia();
                
                document.getElementById("startARDiv").style.display = "none";
                createUnityInstance(document.querySelector("#unity-canvas"), {
                    dataUrl: "Build/AR-圣诞节.data.unityweb",
                    frameworkUrl: "Build/AR-圣诞节.framework.js.unityweb",
                    codeUrl: "Build/AR-圣诞节.wasm.unityweb",
                    streamingAssetsUrl: "StreamingAssets",
                    companyName: "DefaultCompany",
                    productName: "TestImageAR",
                    productVersion: "0.1",
                    //webglContextAttributes: { "preserveDrawingBuffer": true },
                    // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
                    // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
                    },
                    (progress) => {
                        progressBarFull.style.width = 100 * progress + "%";
                    }
                ).then((unityInstance) => {
                    window.unityInstance = unityInstance;
                    ScheduleViewportRefresh();
                    setTimeout(() => window.dispatchEvent(new Event("resize")), 50);
                    loadingBar.style.display = "none";
                }).catch((err) => {
                    console.error("Unity failed to start - ", err);
                    ShowError("Failed to start the experience.<br>启动体验失败。");
                    unityStarted = false;
                    if (startButton) {
                        startButton.disabled = false;
                        startButton.innerText = "Tap to start / 点击开始";
                    }
                    loadingBar.style.display = "none";
                });
                loadingBar.style.display = "block";
            }
            // Prefer the rear camera on mobile devices.
		window.unityFacingMode = "environment"
            window.WEBCAM_SETTINGS = {
                video: {
                    facingMode: unityFacingMode,
                },
                audio: false
            };
            window.requestingForPermissions = false;
            async function RequestWebcam(){
                if (window.webcamStream && window.webcamStream.active) {
                    return true;
                }
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    ShowError("Camera access is not available in this browser.<br>当前浏览器不支持摄像头访问。");
                    return false;
                }
                window.requestingForPermissions = true;
                try{
                    window.webcamStream = await navigator.mediaDevices.getUserMedia(window.WEBCAM_SETTINGS);
                    console.log("Webcam access granted");
                    requestingForPermissions = false;
                    return true;
                }
                catch (err) {
                    //user denied camera permission - show error panel
                    console.error("getUserMedia error - " , err);
                    ShowError("Failed to start the experience. Camera permission was denied.<br>启动失败：摄像头权限被拒绝。");
                    window.requestingForPermissions = false;
                    return false;
                }           
            }
            async function StartWebcam(){
                console.log("StartWebcam")
                while (window.requestingForPermissions) {
                    // Wait until requestingForPermissions becomes true.
                    console.log("Waiting for permissions...");
                    await new Promise(resolve => setTimeout(resolve, 100)); // Adjust the delay time as needed.
                }
                console.log("Got Permissions");
                if(window.webcamStream)
                {
                    const video = document.querySelector("#webcam-video");
                    video.srcObject = webcamStream;
                    try {
                        await arCamera.startWebcam(video);
                        console.log("Webcam started successfully");
                        window.unityInstance.SendMessage('ARCamera', 'OnStartWebcamSuccess');
                    }
                    catch(err){
                        console.error("Webcam failed to start - ", err);
                        window.unityInstance.SendMessage('ARCamera', 'OnStartWebcamFail');
                    }   
                }
                else{
                    console.error("Webcam failed to start - permission not yet granted");
                    window.unityInstance.SendMessage('ARCamera', 'OnStartWebcamFail');
                }  
            }
            async function LoadWebcams(){
                let camDevices = [];
                // let backCams = [];
                let devices = await navigator.mediaDevices.enumerateDevices();
                var ctr = 0;
                devices.forEach(mediaDevice => {
                    if (mediaDevice.kind === 'videoinput') {
                        if(window.unityFacingMode == 'environment' && !mediaDevice.label.includes('facing front')){
                            //back cam only
                            camDevices.push(mediaDevice);
                        }
                        else if(window.unityFacingMode == 'user' && mediaDevice.label.includes('facing front')){
                            //front cam only
                            camDevices.push(mediaDevice);
                        }
                        else{
                            //back and front
                            camDevices.push(mediaDevice);
                        }   
                        
                        ctr++;
                    }
                });
                var select = document.getElementById("chooseCamSel");
                select.style.display = "block";
                var count = 0;
                //reverse array because some Android phones can't distinguish front and back cams at first load
                //and when this happens, most of the time, front cam goes first and back cam goes last
                camDevices = camDevices.reverse();
                camDevices.forEach(mediaDevice => {
                    const option = document.createElement('option');
                    option.value = mediaDevice.deviceId;
                    let label = `Camera ${count}`;
                    if (mediaDevice.label) {
                        label = mediaDevice.label
                    }
                    const textNode = document.createTextNode(label);
                    option.appendChild(textNode);
                    select.appendChild(option);
                    count++;
                });
                iTracker.WEBCAM_NAME = select.options[select.selectedIndex].innerHTML;
            }
            function SelectCam(){
                var select = document.getElementById("chooseCamSel");
                window.deviceId = select.value;
                window.WEBCAM_SETTINGS.video['deviceId'] = deviceId;
                //console.log(window.WEBCAM_SETTINGS);
                iTracker.WEBCAM_NAME = select.options[select.selectedIndex].innerHTML;
            }
            async function FlipCam(){
                arCamera.stopWebcam();
                window.WEBCAM_SETTINGS.video.deviceId = '';
                if(window.WEBCAM_SETTINGS.video.facingMode == 'user'){
                    window.WEBCAM_SETTINGS.video.facingMode = 'environment';
                    arCamera.setFlipped(false);
                }
                else{
                    window.WEBCAM_SETTINGS.video.facingMode = 'user';
                    arCamera.setFlipped(true);
                }
                window.webcamStream = await navigator.mediaDevices.getUserMedia(window.WEBCAM_SETTINGS);
                const video = document.querySelector("#webcam-video");
                video.srcObject = webcamStream;
                await arCamera.startWebcam(video);
            }
            function ShowError(error){
                document.getElementById("errorDiv").style.display = "flex";
                document.getElementById("errorText").innerHTML = error;
            }
            function ShowScreenshot(dataUrl){
                document.getElementById("screenshotDiv").style.display = "flex";
                document.getElementById("screenshotImg").src = dataUrl;
                document.getElementById("screenshotImg").style.width = "80vw";
                document.getElementById("screenshotImg").style.height = 80 / window.innerWidth * window.innerHeight + "vw";
            }
            function ShowConfirmUrl(url){
                document.getElementById("confirmUrlDiv").style.display = "flex";
                window.newUrlString = url;
                document.getElementById("confirmUrlText").innerText = "Are you sure you want to visit " + url;                
            }
            window.ITRACKER_GLOBALS = {
                //place global settings here
                INTERNAL_SMOOTHFACTOR_POS: .075,
            }
            
    </script>
</body>
</html>
